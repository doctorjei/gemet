name: release

# Tag-triggered release workflow for tenkei (Minimal tier).
#
# Trigger:
#   - push of an RC tag matching "v<ver>-rc<n>" -> build + test + GHCR push
#                                                  to rc-suffixed tag only +
#                                                  DRAFT GitHub Release
#   - push of a release tag matching "v<ver>"   -> NO rebuild; skopeo-copy
#                                                  the latest matching rc
#                                                  images to :<ver> and
#                                                  :latest, then flip the
#                                                  rc draft release to
#                                                  published as "v<ver>"
#   - workflow_dispatch (manual)                -> build + test only
#                                                  (no GHCR push, no Release)
#
# Kernel acquisition: always compile locally via scripts/build-kernel.sh
# so the gemet config overlay (kernel/config/<arch>/gemet.conf) lands
# on top of Kata's fragments. Cold compile is ~8-10 min on a GH runner;
# warm runs hit actions/cache (keyed on kernel-relevant inputs) in
# seconds.
#
# Releases that touch kernel/initramfs code paths are created as DRAFTS
# with a pre-publish checklist; a human must run yggdrasil-smoke-test.sh
# on a KVM-capable host before flipping the draft to published. The
# rc-then-promote pattern means every rc release is already a draft,
# so this checklist piggybacks on the existing draft mechanism.
#
# See playbook plan: ~/playbook/plans/github-ci.md (Phase 3).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Kernel version to compile (overrides default 6.18.15)'
        required: false
        default: '6.18.15'

permissions:
  contents: write   # create GitHub Releases
  packages: write   # push OCI images to GHCR

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # build-and-rc: runs on workflow_dispatch OR on an rc tag (vX.Y.Z-rcN).
  # Skips itself entirely on release tags (vX.Y.Z) — the promote job
  # handles those without rebuilding.
  # ──────────────────────────────────────────────────────────────────────
  build-and-rc:
    name: Build, test, rc-publish
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.ref_name, '-rc'))
    env:
      # Kernel version compiled by scripts/build-kernel.sh. Overridable
      # via workflow_dispatch; pinned default for tag-triggered runs.
      KERNEL_VERSION: ${{ github.event.inputs.kernel_version || '6.18.15' }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout (full history for tag diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect tag shape (rc vs release vs dispatch)
        id: shape
        shell: bash
        run: |
          set -euo pipefail
          IS_RC=false
          IS_RELEASE=false
          IS_DISPATCH=false
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            IS_DISPATCH=true
          elif [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc[0-9]+$ ]]; then
            IS_RC=true
          elif [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IS_RELEASE=true
          else
            echo "ERROR: tag '${{ github.ref_name }}' matches neither v<ver>-rc<n> nor v<ver>" >&2
            exit 1
          fi
          echo "IS_RC=$IS_RC"
          echo "IS_RELEASE=$IS_RELEASE"
          echo "IS_DISPATCH=$IS_DISPATCH"
          {
            echo "is_rc=$IS_RC"
            echo "is_release=$IS_RELEASE"
            echo "is_dispatch=$IS_DISPATCH"
          } >> "$GITHUB_OUTPUT"

      - name: Derive version and tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          IS_RC="${{ steps.shape.outputs.is_rc }}"
          IS_DISPATCH="${{ steps.shape.outputs.is_dispatch }}"
          if [[ "$IS_RC" == "true" ]]; then
            # RC tag: ref_name is v<ver>-rc<n>. Strip leading v for
            # full rc-version (e.g. 1.6.2-rc1); strip trailing -rcN
            # for the underlying release version (e.g. 1.6.2).
            TAG="${{ github.ref_name }}"
            RC_VERSION="${TAG#v}"             # 1.6.2-rc1
            VERSION="${RC_VERSION%-rc*}"      # 1.6.2
            IS_TAG_PUSH=true
          elif [[ "$IS_DISPATCH" == "true" ]]; then
            # workflow_dispatch: derive from VERSION file. No rc suffix
            # (we never push to GHCR on dispatch).
            VERSION="$(tr -d '[:space:]' < VERSION)"
            RC_VERSION="$VERSION"
            TAG="v${VERSION}"
            IS_TAG_PUSH=false
          else
            echo "ERROR: build-and-rc reached without rc/dispatch shape" >&2
            exit 1
          fi
          [[ -n "$VERSION" ]] || { echo "ERROR: empty VERSION"; exit 1; }
          echo "VERSION=$VERSION"
          echo "RC_VERSION=$RC_VERSION"
          echo "TAG=$TAG"
          echo "IS_TAG_PUSH=$IS_TAG_PUSH"
          {
            echo "version=$VERSION"
            echo "rc_version=$RC_VERSION"
            echo "tag=$TAG"
            echo "is_tag_push=$IS_TAG_PUSH"
          } >> "$GITHUB_OUTPUT"

      - name: Gate — VERSION matches tag
        if: steps.shape.outputs.is_rc == 'true'
        shell: bash
        run: |
          set -euo pipefail
          FILE_VER="$(tr -d '[:space:]' < VERSION)"
          EXPECT="${{ steps.ver.outputs.version }}"
          if [[ "$FILE_VER" != "$EXPECT" ]]; then
            echo "ERROR: VERSION file ('$FILE_VER') does not match tag-derived version ('$EXPECT')" >&2
            echo "Refusing to build a release whose VERSION file disagrees with its tag." >&2
            exit 1
          fi
          echo "VERSION file matches tag: $FILE_VER"

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          # Common runtime deps for every job path (kernel-cache hit and
          # cold compile). Kernel-compile-only deps (build-essential,
          # flex, bison, bc, libelf-dev, libssl-dev) are installed in the
          # cache-miss branch only — see "Install kernel compile
          # dependencies" below.
          # - busybox-static, cpio, gzip, xz-utils: initramfs pack + tarball IO
          # - e2fsprogs: debugfs + mkfs.ext4 (yggdrasil rdump + qcow2)
          # - qemu-utils: qemu-img (qcow2 build)
          # - podman: OCI build + save + GHCR push + Tier 2 systemd-in-OCI test
          # - jq, curl: JSON + downloads
          sudo apt-get install -y --no-install-recommends \
            busybox-static cpio gzip xz-utils zstd \
            e2fsprogs \
            qemu-utils \
            podman \
            jq \
            curl
          for bin in debugfs mkfs.ext4 qemu-img podman busybox cpio jq curl zstd; do
            command -v "$bin" >/dev/null || { echo "ERROR: missing $bin after apt install"; exit 1; }
          done

      - name: Enable unprivileged user namespaces
        shell: bash
        run: |
          set -euo pipefail
          # Ubuntu 24.04 ships with kernel.apparmor_restrict_unprivileged_userns=1
          # by default, which blocks `unshare --user --map-root-user`. The
          # yggdrasil build uses this to avoid needing host root, so we
          # relax it for the life of this runner (ephemeral).
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      # ────────────────────────────────────────────────────────────────
      # Kernel acquisition: always compile locally so the gemet config
      # overlay (kernel/config/<arch>/gemet.conf) lands on top of Kata's
      # fragments. actions/cache stores build/vmlinuz keyed on the
      # kernel-relevant inputs (kernel version, Kata configs/patches,
      # gemet overlay, build scripts) — exact-match only, so any change
      # to those inputs forces a rebuild. Cold compile ≈ 8–10 min;
      # cache hit ≈ seconds.
      # ────────────────────────────────────────────────────────────────

      - name: Restore cached gemet kernel
        id: kernel-cache
        uses: actions/cache@v4
        with:
          path: build/vmlinuz
          key: kernel-${{ env.KERNEL_VERSION }}-${{ hashFiles('upstream/kernel/configs/**', 'upstream/kernel/patches/**', 'kernel/config/**', 'scripts/build-kernel.sh', 'upstream/kernel/build-kernel.sh') }}

      - name: Install kernel compile dependencies
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get install -y --no-install-recommends \
            build-essential flex bison bc libelf-dev libssl-dev

      - name: Compile kernel locally
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Compiling kernel $KERNEL_VERSION (gemet overlay applied on top of Kata fragments)."
          echo "(cold compile ~8-10 min on GH runner; cached runs hit kernel-cache instead)"
          bash scripts/build-kernel.sh "$KERNEL_VERSION"
          ls -l build/vmlinuz

      # ── Always-run: build initramfs + final kernel sanity check ────

      - name: Build initramfs
        shell: bash
        run: |
          set -euo pipefail
          # Idempotent: rebuilds from initramfs/ source each time.
          # Cache-hit path: produces the initramfs (wasn't built since
          # only build/vmlinuz was cached). Compile path: overwrites
          # what build-kernel.sh's install phase staged, but the content
          # is identical (build.sh is the source of truth for both).
          bash initramfs/build.sh build/gemet-initramfs.img
          ls -l build/gemet-initramfs.img

      - name: Verify final kernel + initramfs
        shell: bash
        run: |
          set -euo pipefail
          [[ -s build/vmlinuz ]] \
            || { echo "ERROR: build/vmlinuz is missing or empty after kernel acquisition"; exit 1; }
          file build/vmlinuz | grep -q 'Linux kernel' \
            || { echo "ERROR: build/vmlinuz is not a Linux kernel image"; exit 1; }
          [[ -s build/gemet-initramfs.img ]] \
            || { echo "ERROR: build/gemet-initramfs.img missing or empty"; exit 1; }
          echo "Kernel acquisition path: ${{ steps.kernel-cache.outputs.cache-hit == 'true' && 'cache hit (build/vmlinuz restored)' || 'local compile' }}"

      - name: Build yggdrasil rootfs (.txz + qcow2 + OCI import)
        shell: bash
        run: |
          set -euo pipefail
          bash rootfs/build-yggdrasil.sh
          VERSION="${{ steps.ver.outputs.version }}"
          ls -l "build/yggdrasil-${VERSION}.txz" "build/yggdrasil-${VERSION}.qcow2"
          podman image exists "localhost/yggdrasil:${VERSION}" \
            || { echo "ERROR: yggdrasil OCI image was not imported"; exit 1; }

      - name: Build bifrost rootfs (.txz + qcow2 + OCI import)
        shell: bash
        run: |
          set -euo pipefail
          # Bifrost is a derived image (yggdrasil + opinionated SSH layer);
          # runs in ~30 s since it just extracts the yggdrasil .txz,
          # overlays a handful of files, and re-packages.
          bash rootfs/build-bifrost.sh
          VERSION="${{ steps.ver.outputs.version }}"
          ls -l "build/bifrost-${VERSION}.txz" "build/bifrost-${VERSION}.qcow2"
          podman image exists "localhost/bifrost:${VERSION}" \
            || { echo "ERROR: bifrost OCI image was not imported"; exit 1; }

      - name: Build canopy rootfs (.txz + qcow2 + OCI import)
        shell: bash
        run: |
          set -euo pipefail
          # Canopy is a derived image (yggdrasil minus init-family); runs
          # apt-get purge in a chroot over the yggdrasil rootfs, removes
          # residual unit dirs, re-packages.
          bash rootfs/build-canopy.sh
          VERSION="${{ steps.ver.outputs.version }}"
          ls -l "build/canopy-${VERSION}.txz" "build/canopy-${VERSION}.qcow2"
          podman image exists "localhost/canopy:${VERSION}" \
            || { echo "ERROR: canopy OCI image was not imported"; exit 1; }

      - name: Build kernel-as-OCI image
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          bash scripts/build-kernel-oci.sh "$VERSION"
          podman image exists "localhost/gemet-kernel:${VERSION}" \
            || { echo "ERROR: gemet-kernel OCI image was not built"; exit 1; }

      - name: Export OCI archives
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          podman save --format=oci-archive \
            -o "build/yggdrasil-${VERSION}-oci.tar" \
            "localhost/yggdrasil:${VERSION}"
          podman save --format=oci-archive \
            -o "build/bifrost-${VERSION}-oci.tar" \
            "localhost/bifrost:${VERSION}"
          podman save --format=oci-archive \
            -o "build/canopy-${VERSION}-oci.tar" \
            "localhost/canopy:${VERSION}"
          podman save --format=oci-archive \
            -o "build/gemet-boot-${VERSION}-oci.tar" \
            "localhost/gemet-kernel:${VERSION}"
          ls -l \
            "build/yggdrasil-${VERSION}-oci.tar" \
            "build/bifrost-${VERSION}-oci.tar" \
            "build/canopy-${VERSION}-oci.tar" \
            "build/gemet-boot-${VERSION}-oci.tar"

      - name: Tier 1 — structural tests
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          # Single invocation covers all three variants via auto-detection
          # on <variant>-<ver>.txz existence.
          bash scripts/ci-structural-tests.sh --build-dir=build/ --version="$VERSION"

      - name: Tier 2 — systemd-in-OCI tests (yggdrasil)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          bash scripts/ci-systemd-test.sh \
            --oci-archive="build/yggdrasil-${VERSION}-oci.tar" \
            --version="$VERSION"

      - name: Tier 2 — systemd-in-OCI tests (bifrost)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          # Bifrost's Tier 2 is a cousin of ci-systemd-test.sh with the
          # bifrost-specific contract added: ssh.service enabled, SSH
          # host keys present after first boot (bifrost-hostkeys.service
          # fires), bifrost-sshkey-sync.service is enabled but inactive
          # (no /etc/bifrost/authorized_keys to read from in a vanilla
          # build). See scripts/ci-bifrost-test.sh for the full contract.
          bash scripts/ci-bifrost-test.sh \
            --oci-archive="build/bifrost-${VERSION}-oci.tar" \
            --version="$VERSION"

      - name: Tier 2 — structural-runtime tests (canopy)
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          # Canopy has no pid1 so `podman run --systemd=always` is
          # meaningless. Instead, ci-canopy-test.sh runs a one-shot
          # process-container check: apt-get --version + bash --version
          # + dpkg package count in expected band. See the script header
          # for the full rationale.
          bash scripts/ci-canopy-test.sh \
            --oci-archive="build/canopy-${VERSION}-oci.tar" \
            --version="$VERSION"

      - name: Compute boot-path change [requires VM smoke test] (on rc tag)
        id: bootcheck
        if: steps.shape.outputs.is_rc == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          # Find the most recent tag strictly before HEAD. If none, treat as
          # first release and conservatively require a VM smoke test.
          PREV_TAG="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo '')"
          BOOT_TEST_REQUIRED=false
          CHANGE_REASON=""
          if [[ -z "$PREV_TAG" ]]; then
            BOOT_TEST_REQUIRED=true
            CHANGE_REASON="first release (no previous tag)"
          else
            CHANGED="$(git diff --name-only "${PREV_TAG}..HEAD" || true)"
            echo "Changed files since $PREV_TAG:"
            echo "$CHANGED" | sed 's/^/  /'
            if echo "$CHANGED" | grep -qE '^(initramfs/|upstream/kernel/|scripts/build-kernel\.sh|scripts/build-kernel-oci\.sh|kernel/|\.github/workflows/release\.yml)'; then
              BOOT_TEST_REQUIRED=true
              CHANGE_REASON="kernel/initramfs paths changed since ${PREV_TAG}"
            fi
          fi
          echo "PREV_TAG=$PREV_TAG"
          echo "BOOT_TEST_REQUIRED=$BOOT_TEST_REQUIRED"
          echo "CHANGE_REASON=$CHANGE_REASON"
          {
            echo "prev_tag=$PREV_TAG"
            echo "boot_test_required=$BOOT_TEST_REQUIRED"
            echo "change_reason=$CHANGE_REASON"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR (on rc tag)
        if: steps.shape.outputs.is_rc == 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Tag and push OCI images to GHCR with rc suffix only (on rc tag)
        if: steps.shape.outputs.is_rc == 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          RC_VERSION="${{ steps.ver.outputs.rc_version }}"
          # rc tag flow: push ONLY the rc-suffixed tag (e.g. :1.6.2-rc1).
          # We do NOT push :<ver> or :latest here — those get populated
          # by the promote job via skopeo copy when the release tag
          # (v<ver>) is pushed.

          podman tag "localhost/yggdrasil:${VERSION}" \
            "ghcr.io/doctorjei/gemet/yggdrasil:${RC_VERSION}"
          podman push "ghcr.io/doctorjei/gemet/yggdrasil:${RC_VERSION}"

          podman tag "localhost/bifrost:${VERSION}" \
            "ghcr.io/doctorjei/gemet/bifrost:${RC_VERSION}"
          podman push "ghcr.io/doctorjei/gemet/bifrost:${RC_VERSION}"

          podman tag "localhost/canopy:${VERSION}" \
            "ghcr.io/doctorjei/gemet/canopy:${RC_VERSION}"
          podman push "ghcr.io/doctorjei/gemet/canopy:${RC_VERSION}"

          podman tag "localhost/gemet-kernel:${VERSION}" \
            "ghcr.io/doctorjei/gemet/boot:${RC_VERSION}"
          podman push "ghcr.io/doctorjei/gemet/boot:${RC_VERSION}"

      - name: Compress OCI archives for release attachment (on rc tag)
        if: steps.shape.outputs.is_rc == 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          # xz-compress per-variant OCI archives for release-page upload
          # only. GHCR push uses `podman tag`/`podman push` against the
          # in-podman image (not the saved .tar), and the Tier 1/2 test
          # steps consume the uncompressed `-oci.tar` directly, so we
          # keep the `.tar` sources intact and emit a `.txz` sibling
          # strictly as a release attachment. Matches the .txz rename
          # shipped for the per-variant rootfs tarballs.
          for a in \
            "build/yggdrasil-${VERSION}-oci.tar" \
            "build/bifrost-${VERSION}-oci.tar" \
            "build/canopy-${VERSION}-oci.tar" \
            "build/gemet-boot-${VERSION}-oci.tar"
          do
            [[ -f "$a" ]] || { echo "ERROR: missing $a"; exit 1; }
            # -k keeps the original .tar in place for intra-workflow use.
            # -T0 uses all available cores; -9 for maximum xz ratio.
            xz -k -T0 -9 -c "$a" > "${a%.tar}.txz"
          done
          ls -l \
            "build/yggdrasil-${VERSION}-oci.txz" \
            "build/bifrost-${VERSION}-oci.txz" \
            "build/canopy-${VERSION}-oci.txz" \
            "build/gemet-boot-${VERSION}-oci.txz"

      - name: Create DRAFT GitHub Release for rc (on rc tag)
        if: steps.shape.outputs.is_rc == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          RC_VERSION="${{ steps.ver.outputs.rc_version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          BOOT_TEST_REQUIRED="${{ steps.bootcheck.outputs.boot_test_required }}"
          CHANGE_REASON="${{ steps.bootcheck.outputs.change_reason }}"
          PREV_TAG="${{ steps.bootcheck.outputs.prev_tag }}"

          ASSETS=(
            "build/vmlinuz"
            "build/gemet-initramfs.img"
            "build/yggdrasil-${VERSION}.txz"
            "build/yggdrasil-${VERSION}.qcow2"
            "build/yggdrasil-${VERSION}-oci.txz"
            "build/bifrost-${VERSION}.txz"
            "build/bifrost-${VERSION}.qcow2"
            "build/bifrost-${VERSION}-oci.txz"
            "build/canopy-${VERSION}.txz"
            "build/canopy-${VERSION}.qcow2"
            "build/canopy-${VERSION}-oci.txz"
            "build/gemet-boot-${VERSION}-oci.txz"
          )
          for a in "${ASSETS[@]}"; do
            [[ -f "$a" ]] || { echo "ERROR: missing release asset: $a"; exit 1; }
          done

          # Every rc release is a draft by design (rc-then-promote).
          # The boot-path check still runs so the checklist body can be
          # surfaced when relevant.
          BODY=/tmp/release-body.md
          # Note: YAML's block-scalar strips the common leading indent,
          # so by the time bash runs this heredoc the content is flush-left.
          if [[ "$BOOT_TEST_REQUIRED" == "true" ]]; then
            echo "Creating DRAFT rc release with boot-test checklist — $CHANGE_REASON"
            cat > "$BODY" <<EOF
          ## Release candidate: ${RC_VERSION}

          This is an rc draft. Promote to v${VERSION} by pushing tag \`v${VERSION}\`,
          which triggers skopeo-copy of these images to \`:${VERSION}\` and \`:latest\`
          and flips this draft to published.

          ## Pre-publish checklist — manual VM boot test required

          This release changes kernel or initramfs code (${CHANGE_REASON}).
          Run the full VM boot smoke test before promoting:

          - [ ] Download the artifacts below to a KVM-capable host (e.g. droste VM 300).
          - [ ] Run \`scripts/yggdrasil-smoke-test.sh\` against them.
          - [ ] Confirm all 5 serial-console checkpoints pass (kernel start,
                initramfs, systemd PID 1, default target, login prompt).
          - [ ] Push tag \`v${VERSION}\` to promote this rc to a published release.

          ---

          EOF
          else
            echo "Creating DRAFT rc release (no boot-path changes detected)"
            cat > "$BODY" <<EOF
          ## Release candidate: ${RC_VERSION}

          This is an rc draft. Promote to v${VERSION} by pushing tag \`v${VERSION}\`,
          which triggers skopeo-copy of these images to \`:${VERSION}\` and \`:latest\`
          and flips this draft to published.

          ---

          EOF
          fi

          # Append auto-generated notes via the API (works with or without a
          # known previous tag — omit previous_tag_name if none).
          if [[ -n "$PREV_TAG" ]]; then
            gh api "/repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="$TAG" \
              -f previous_tag_name="$PREV_TAG" \
              --jq .body >> "$BODY"
          else
            gh api "/repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="$TAG" \
              --jq .body >> "$BODY"
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --draft \
            --notes-file "$BODY" \
            "${ASSETS[@]}"

      - name: Summary (workflow_dispatch)
        if: steps.shape.outputs.is_dispatch == 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.ver.outputs.version }}"
          echo "workflow_dispatch run completed for VERSION=$VERSION."
          echo "Skipped: GHCR push and GitHub Release creation."
          echo "Built + tested artifacts:"
          ls -l \
            build/vmlinuz \
            build/gemet-initramfs.img \
            "build/yggdrasil-${VERSION}.txz" \
            "build/yggdrasil-${VERSION}.qcow2" \
            "build/yggdrasil-${VERSION}-oci.tar" \
            "build/bifrost-${VERSION}.txz" \
            "build/bifrost-${VERSION}.qcow2" \
            "build/bifrost-${VERSION}-oci.tar" \
            "build/canopy-${VERSION}.txz" \
            "build/canopy-${VERSION}.qcow2" \
            "build/canopy-${VERSION}-oci.tar" \
            "build/gemet-boot-${VERSION}-oci.tar"

  # ──────────────────────────────────────────────────────────────────────
  # promote: runs ONLY on a release tag (vX.Y.Z, no rc suffix). No
  # rebuild. Identifies the latest matching v<ver>-rc<n> tag, skopeo-
  # copies each variant from :<ver>-rc<n> to :<ver> and :latest, then
  # finds the existing draft release for the rc tag and edits it to
  # tag=v<ver> with draft=false.
  # ──────────────────────────────────────────────────────────────────────
  promote:
    name: Promote rc to release
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && !contains(github.ref_name, '-rc')
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout (full history for rc tag lookup)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag shape
        id: shape
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: promote job triggered for tag '${{ github.ref_name }}' which does not match v<ver>" >&2
            echo "       (rc tags should land in build-and-rc; other tag shapes are unsupported)" >&2
            exit 1
          fi
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "TAG=$TAG"
          echo "VERSION=$VERSION"
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Find latest matching rc tag
        id: rc
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.shape.outputs.version }}"
          # Pick the highest-numbered rc tag for this version using
          # natural version sort. `git tag --list` reads from the local
          # checkout, which is the source of truth — the rc tag had to
          # exist (and trigger build-and-rc) before this release tag
          # was pushed.
          RC_TAG="$(git tag --list "v${VERSION}-rc*" | sort -V | tail -n1 || true)"
          if [[ -z "$RC_TAG" ]]; then
            echo "ERROR: v${VERSION} was tagged but no v${VERSION}-rc* exists; tag rc first" >&2
            echo "       (push a tag like v${VERSION}-rc1 to build images, then push v${VERSION} to promote)" >&2
            exit 1
          fi
          RC_VERSION="${RC_TAG#v}"
          echo "RC_TAG=$RC_TAG"
          echo "RC_VERSION=$RC_VERSION"
          {
            echo "rc_tag=$RC_TAG"
            echo "rc_version=$RC_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Install skopeo
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends skopeo
          command -v skopeo >/dev/null || { echo "ERROR: skopeo not found after install"; exit 1; }
          skopeo --version

      - name: Skopeo-copy rc images to release + latest tags
        shell: bash
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.shape.outputs.version }}"
          RC_VERSION="${{ steps.rc.outputs.rc_version }}"
          # Auth: use GITHUB_TOKEN as both src and dst creds. ghcr.io
          # accepts the actions token for read+write within the same
          # repo's namespace (permissions: packages: write declared
          # at workflow level).
          CREDS="${GHCR_USER}:${GHCR_TOKEN}"
          for variant in yggdrasil bifrost canopy boot; do
            SRC="docker://ghcr.io/doctorjei/gemet/${variant}:${RC_VERSION}"
            DST_VER="docker://ghcr.io/doctorjei/gemet/${variant}:${VERSION}"
            DST_LATEST="docker://ghcr.io/doctorjei/gemet/${variant}:latest"
            echo "── Promoting ${variant}: ${RC_VERSION} -> ${VERSION} + latest"
            skopeo copy --all \
              --src-creds "$CREDS" --dest-creds "$CREDS" \
              "$SRC" "$DST_VER"
            skopeo copy --all \
              --src-creds "$CREDS" --dest-creds "$CREDS" \
              "$SRC" "$DST_LATEST"
          done

      - name: Promote draft rc release to published v<ver>
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.shape.outputs.tag }}"
          RC_TAG="${{ steps.rc.outputs.rc_tag }}"
          # The rc job created a draft release named after the rc tag.
          # Edit it: rename its tag to v<ver>, drop the draft flag.
          # `gh release edit` operates on the existing release by its
          # current tag name.
          gh release view "$RC_TAG" >/dev/null \
            || { echo "ERROR: no GitHub Release found for $RC_TAG (was the rc draft release deleted?)"; exit 1; }
          gh release edit "$RC_TAG" \
            --tag "$TAG" \
            --title "$TAG" \
            --draft=false
          echo "Promoted draft release ${RC_TAG} -> published ${TAG}"
