# Gemet-side kernel config overlay
#
# Applied on top of Kata's fragments after upstream/kernel/build-kernel.sh
# completes the setup step. See scripts/build-kernel.sh for the merge_config
# invocation.
#
# Why this overlay exists: Kata's target use case (kata-agent over vsock)
# doesn't need userspace ACPI event delivery, so their fragments leave
# CONFIG_INPUT_EVDEV unset. Gemet's consumers (PVE qm shutdown, any host
# that sends an ACPI power-button press via QMP) need /dev/input/event*
# to exist so systemd-logind can react. Without this, `qm shutdown` hangs
# until forceStop kicks in.
#
# Keep this file minimal — only set what gemet specifically needs that
# Kata doesn't provide. Per-arch overlays live in sibling directories.

CONFIG_INPUT_EVDEV=y
